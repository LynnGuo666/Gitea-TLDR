services:
  gitea-pr-reviewer:
    image: ghcr.io/lynnguo666/gitea-tldr:main
    pull_policy: always
    container_name: gitea-pr-reviewer
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./review-workspace:/app/review-workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    networks:
      - gitea-tldr-net

networks:
  gitea-tldr-net:
    driver: bridge
